<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi-Agent GridWorld — PPO RL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:        #111827;
      --surface:   #1f2937;
      --surface2:  #27303f;
      --border:    #374151;
      --accent:    #6366f1;
      --accent2:   #818cf8;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #facc15;
      --text:      #f9fafb;
      --muted:     #9ca3af;
      --radius:    10px;
      --shadow:    0 4px 24px rgba(0,0,0,.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .02em; }
    header h1 span { color: var(--accent2); }
    .badge {
      font-size: .72rem; padding: 3px 10px; border-radius: 99px;
      background: rgba(99,102,241,.2); color: var(--accent2); font-weight: 600;
    }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr 300px;
      flex:1; overflow: hidden;
    }

    /* ── SIDEBAR LEFT ── */
    .sidebar-left {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 16px; gap: 14px;
      overflow-y: auto;
    }
    .sidebar-left h2 { font-size:.8rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
    label { font-size:.82rem; color:var(--muted); display:block; margin-bottom:3px; }
    input[type=number], input[type=range] { width:100%; }
    input[type=number] {
      background:var(--surface2); border:1px solid var(--border);
      color:var(--text); padding:6px 10px; border-radius:6px; font-size:.88rem;
    }
    input[type=range] { accent-color: var(--accent); cursor:pointer; }
    .range-row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .range-val { font-size:.82rem; font-family:'JetBrains Mono'; color:var(--accent2); min-width:38px; text-align:right; }
    .param-group { display:flex; flex-direction:column; gap:8px; }

    /* Buttons */
    .btn {
      padding: 8px 14px; border-radius:var(--radius); border:none;
      cursor:pointer; font-weight:600; font-size:.85rem; transition:.15s;
    }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent2); }
    .btn-success { background:var(--green); color:#000; }
    .btn-success:hover { filter:brightness(1.1); }
    .btn-danger  { background:var(--red); color:#fff; }
    .btn-danger:hover  { filter:brightness(1.1); }
    .btn-outline {
      background: transparent; border:1px solid var(--border);
      color:var(--text);
    }
    .btn-outline:hover { background:var(--surface2); }
    .btn-sm { font-size:.78rem; padding:5px 10px; }

    .controls-row { display:flex; gap:8px; flex-wrap:wrap; }
    .speed-row { display:flex; flex-direction:column; gap:4px; }

    hr.sep { border:none; border-top:1px solid var(--border); }

    /* Legend */
    .legend { display:flex; flex-direction:column; gap:6px; }
    .legend-item { display:flex; align-items:center; gap:8px; font-size:.8rem; }
    .legend-swatch {
      width:16px; height:16px; border-radius:3px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:.6rem; font-weight:700;
    }

    /* ── MAIN CANVAS AREA ── */
    .main {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:16px; overflow:hidden; position:relative;
    }
    canvas#grid {
      image-rendering: pixelated;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 2px solid var(--border);
      max-width:100%; max-height:100%;
    }
    .step-badge {
      position:absolute; top:20px; left:50%; transform:translateX(-50%);
      background:rgba(17,24,39,.85); backdrop-filter:blur(6px);
      padding:5px 18px; border-radius:99px; font-weight:700; font-size:.9rem;
      border: 1px solid var(--border); pointer-events:none;
    }
    .status-dot {
      width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:5px;
    }
    .dot-playing { background:var(--green); animation:pulse 1s infinite; }
    .dot-paused  { background:var(--yellow); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── SIDEBAR RIGHT ── */
    .sidebar-right {
      background: var(--surface); border-left:1px solid var(--border);
      display:flex; flex-direction:column; overflow:hidden;
    }
    .tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
    .tab {
      flex:1; text-align:center; padding:10px 0; font-size:.82rem; font-weight:600;
      cursor:pointer; color:var(--muted); border-bottom:2px solid transparent;
      transition:.15s; user-select:none;
    }
    .tab.active { color:var(--text); border-bottom-color:var(--accent); }
    .tab-panel { display:none; flex:1; overflow:auto; padding:12px; }
    .tab-panel.active { display:block; }

    /* Scoreboard */
    table { width:100%; border-collapse:collapse; font-size:.78rem; }
    th {
      text-align:left; padding:6px 8px; background:var(--surface2);
      color:var(--muted); font-weight:600; position:sticky; top:0;
      font-size:.72rem; text-transform:uppercase; letter-spacing:.05em;
    }
    td { padding:6px 8px; border-bottom:1px solid var(--border); font-family:'JetBrains Mono'; }
    tr:hover td { background:var(--surface2); }
    .color-dot {
      width:10px; height:10px; border-radius:50%; display:inline-block;
      margin-right:5px; vertical-align:middle;
    }
    .pos-cell { color:var(--muted); }
    .reward-pos { color:var(--green); font-weight:600; }
    .reward-neg { color:var(--red);   font-weight:600; }

    /* Log console */
    #log-console {
      font-family:'JetBrains Mono'; font-size:.73rem; line-height:1.6;
      white-space:pre-wrap; word-break:break-all;
    }
    #log-console .log-step { color:var(--accent2); font-weight:700; }
    #log-console .log-correct { color:var(--green); font-weight:700; }
    #log-console .log-incorrect { color:var(--red); font-weight:700; }
    #log-console .log-normal { color:var(--muted); }
    .log-actions-row { display:flex; gap:6px; padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
  </style>
</head>
<body>

<header>
  <h1>Multi-Agent <span>GridWorld</span> — PPO Reinforcement Learning</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <span id="model-badge" class="badge">Rule-Based</span>
    <span class="badge" id="policy-badge">9 Agents</span>
  </div>
</header>

<div class="layout">

  <!-- ── LEFT SIDEBAR: CONTROLS ── -->
  <aside class="sidebar-left">
    <h2>Configuration</h2>
    <div class="param-group">
      <div>
        <label>Grid Size</label>
        <input type="number" id="cfg-grid" value="25" min="10" max="50"/>
      </div>
      <div>
        <label>Green Goals</label>
        <input type="number" id="cfg-green" value="12" min="1" max="30"/>
      </div>
      <div>
        <label>Red Goals</label>
        <input type="number" id="cfg-red" value="6" min="1" max="20"/>
      </div>
      <div>
        <label>Obstacles</label>
        <input type="number" id="cfg-obs" value="50" min="0" max="200"/>
      </div>
      <div>
        <label>Max Steps</label>
        <input type="number" id="cfg-max" value="1000" min="100" max="5000"/>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-reset">↺ Reset / Apply</button>

    <hr class="sep"/>
    <h2>Playback</h2>
    <div class="controls-row">
      <button class="btn btn-success" id="btn-play" style="flex:1">▶ Play</button>
      <button class="btn btn-outline btn-sm" id="btn-step">›| Step</button>
    </div>
    <div class="speed-row">
      <label>Speed delay (ms)</label>
      <div class="range-row">
        <input type="range" id="speed-slider" min="0" max="500" value="80" step="10"/>
        <span class="range-val" id="speed-val">80ms</span>
      </div>
    </div>

    <hr class="sep"/>
    <h2>Export</h2>
    <a href="/api/logs/csv" download>
      <button class="btn btn-outline" style="width:100%">⬇ Download Logs CSV</button>
    </a>

    <hr class="sep"/>
    <h2>Legend</h2>
    <div class="legend" id="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background:#22c55e">G</div><span>Green Goal (+1.0)</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#ef4444">R</div><span>Red Goal (−1.0)</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#374151">X</div><span>Obstacle</span>
      </div>
    </div>
  </aside>

  <!-- ── MAIN CANVAS ── -->
  <main class="main">
    <div class="step-badge">
      <span class="status-dot dot-paused" id="status-dot"></span>
      Step <span id="step-count">0</span> / <span id="step-max">1000</span>
    </div>
    <canvas id="grid"></canvas>
  </main>

  <!-- ── RIGHT SIDEBAR: SCOREBOARD + LOGS ── -->
  <aside class="sidebar-right">
    <div class="tabs">
      <div class="tab active" data-tab="scoreboard">Scoreboard</div>
      <div class="tab" data-tab="logs">Logs</div>
    </div>

    <!-- Scoreboard tab -->
    <div class="tab-panel active" id="tab-scoreboard">
      <table id="scoreboard">
        <thead>
          <tr>
            <th>Agent</th>
            <th>Pos</th>
            <th>Reward</th>
            <th>✓/✗</th>
            <th>Steps</th>
          </tr>
        </thead>
        <tbody id="scoreboard-body"></tbody>
      </table>
    </div>

    <!-- Logs tab -->
    <div class="tab-panel" id="tab-logs">
      <div class="log-actions-row">
        <button class="btn btn-outline btn-sm" id="btn-clear-log">Clear</button>
        <button class="btn btn-outline btn-sm" id="btn-scroll-log">Auto-scroll: ON</button>
      </div>
      <div style="padding:10px;overflow:auto;height:calc(100vh - 160px);" id="log-wrap">
        <div id="log-console"></div>
      </div>
    </div>
  </aside>

</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let state       = null;
let stepCount   = 0;
let maxSteps    = 1000;
let playing     = false;
let playTimer   = null;
let autoScroll  = true;
let delay       = 80;

// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const canvas  = document.getElementById('grid');
const ctx     = canvas.getContext('2d');
const TILE    = 22;   // px per cell

// ─── COLORS & SYMBOLS ─────────────────────────────────────────────────────────
const AGENT_COLORS = [
  "#3498db","#f1c40f","#00e5ff","#e056fd",
  "#ffffff","#e67e22","#9b59b6","#fd79a8","#c0392b"
];
const AGENT_NAMES = [
  "Blue","Yellow","Cyan","Magenta","White","Orange","Purple","Pink","Brown"
];

// ─── DRAW GRID ─────────────────────────────────────────────────────────────────
function drawGrid(st) {
  if (!st) return;
  const G = st.grid_size;
  canvas.width  = G * TILE;
  canvas.height = G * TILE;

  // Background
  ctx.fillStyle = '#111827';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#1f2937';
  ctx.lineWidth   = 0.5;
  for (let i = 0; i <= G; i++) {
    ctx.beginPath(); ctx.moveTo(i*TILE,0);    ctx.lineTo(i*TILE,G*TILE); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*TILE);    ctx.lineTo(G*TILE,i*TILE); ctx.stroke();
  }

  // Obstacles
  ctx.fillStyle = '#374151';
  for (const [r,c] of st.obstacles) {
    ctx.fillRect(c*TILE+1, r*TILE+1, TILE-2, TILE-2);
    ctx.fillStyle='#4b5563';
    ctx.font = `bold ${TILE*.55}px Inter`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✕', c*TILE+TILE/2, r*TILE+TILE/2);
    ctx.fillStyle='#374151';
  }

  // Green goals
  for (const [r,c] of st.green_goals) {
    drawCross(c, r, '#22c55e');
  }

  // Red goals
  for (const [r,c] of st.red_goals) {
    drawCross(c, r, '#ef4444');
  }

  // Agents
  for (const ag of st.agents) {
    const [r,c] = ag.pos;
    const col   = ag.hex;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    ctx.beginPath();
    ctx.ellipse(c*TILE+TILE/2, r*TILE+TILE-4, TILE*.3, 3, 0, 0, Math.PI*2);
    ctx.fill();
    // body circle
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(c*TILE+TILE/2, r*TILE+TILE/2, TILE*.38, 0, Math.PI*2);
    ctx.fill();
    // ID label
    ctx.fillStyle = getContrastColor(col);
    ctx.font = `bold ${TILE*.42}px Inter`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ag.id, c*TILE+TILE/2, r*TILE+TILE/2);
  }
}

function drawCross(col, row, color) {
  const x = col*TILE, y = row*TILE, T = TILE;
  ctx.fillStyle = color;
  const arm = T*.16, len = T*.7, off = (T-len)/2;
  // vertical bar
  ctx.fillRect(x+T/2-arm, y+off, arm*2, len);
  // horizontal bar
  ctx.fillRect(x+off, y+T/2-arm, len, arm*2);
}

function getContrastColor(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (r*.299+g*.587+b*.114)>150 ? '#111' : '#fff';
}

// ─── SCOREBOARD ───────────────────────────────────────────────────────────────
function updateScoreboard(st) {
  const tbody = document.getElementById('scoreboard-body');
  tbody.innerHTML = '';
  for (const ag of st.agents) {
    const rClass = ag.cum_reward >= 0 ? 'reward-pos' : 'reward-neg';
    const sign   = ag.cum_reward >= 0 ? '+' : '';
    tbody.innerHTML += `
      <tr>
        <td>
          <span class="color-dot" style="background:${ag.hex}"></span>
          <strong>${ag.id}</strong> ${ag.color}
        </td>
        <td class="pos-cell">(${ag.pos[0]},${ag.pos[1]})</td>
        <td class="${rClass}">${sign}${ag.cum_reward.toFixed(2)}</td>
        <td><span style="color:#22c55e">${ag.correct}</span>/<span style="color:#ef4444">${ag.incorrect}</span></td>
        <td>${ag.steps}</td>
      </tr>`;
  }
}

// ─── LOGS ─────────────────────────────────────────────────────────────────────
function appendLogs(results) {
  const el     = document.getElementById('log-console');
  const wrap   = document.getElementById('log-wrap');
  for (const res of results) {
    let html = `<div><span class="log-step">Step ${res.step}:</span></div>`;
    for (const lg of res.logs) {
      const sign   = lg.reward >= 0 ? '+' : '';
      const cls    = lg.action_desc === 'Correct Goal' ? 'log-correct'
                   : lg.action_desc === 'Incorrect Goal' ? 'log-incorrect' : 'log-normal';
      const note   = lg.action_desc !== 'Normal' ? ` <span class="${cls}">(${lg.action_desc})</span>` : '';
      html += `<div class="${cls}">  Agent${lg.agent_id} (${lg.color}) → ${lg.action.padEnd(5)} → (${lg.pos[0].toString().padStart(2,'0')},${lg.pos[1].toString().padStart(2,'0')}) → Reward: ${sign}${lg.reward}${note}</div>`;
    }
    el.innerHTML += html;
  }
  if (autoScroll) wrap.scrollTop = wrap.scrollHeight;
}

// ─── API CALLS ────────────────────────────────────────────────────────────────
async function fetchState() {
  const r = await fetch('/api/state');
  const d = await r.json();
  state = d.state; stepCount = d.step;
  drawGrid(state);
  updateScoreboard(state);
  document.getElementById('step-count').textContent = stepCount;
}

async function doStep(n=1) {
  const r = await fetch('/api/step', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({n, delay:0})
  });
  const d = await r.json();
  state = d.state; stepCount = d.step;
  document.getElementById('step-count').textContent = stepCount;
  drawGrid(state);
  updateScoreboard(state);
  appendLogs(d.results);
  if (d.done) stopPlay();
  return d.done;
}

async function doReset() {
  const cfg = {
    grid_size:       +document.getElementById('cfg-grid').value,
    num_green_goals: +document.getElementById('cfg-green').value,
    num_red_goals:   +document.getElementById('cfg-red').value,
    num_obstacles:   +document.getElementById('cfg-obs').value,
    max_steps:       +document.getElementById('cfg-max').value,
  };
  maxSteps = cfg.max_steps;
  document.getElementById('step-max').textContent = maxSteps;
  const r = await fetch('/api/reset', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(cfg)
  });
  const d = await r.json();
  state = d.state; stepCount = 0;
  document.getElementById('step-count').textContent = 0;
  document.getElementById('log-console').innerHTML = '';
  drawGrid(state);
  updateScoreboard(state);
  stopPlay();
}

// ─── PLAYBACK ─────────────────────────────────────────────────────────────────
function startPlay() {
  if (playing) return;
  playing = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('status-dot').className = 'status-dot dot-playing';
  scheduleNext();
}

async function scheduleNext() {
  if (!playing) return;
  const done = await doStep(1);
  if (!done) {
    playTimer = setTimeout(scheduleNext, delay);
  } else {
    stopPlay();
  }
}

function stopPlay() {
  playing = false;
  clearTimeout(playTimer);
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('status-dot').className = 'status-dot dot-paused';
}

// ─── BUILD LEGEND WITH AGENTS ─────────────────────────────────────────────────
function buildLegend() {
  const legend = document.getElementById('legend');
  // clear old agent entries if any
  const existing = legend.querySelectorAll('.agent-entry');
  existing.forEach(e => e.remove());
  AGENT_NAMES.forEach((name, i) => {
    const d = document.createElement('div');
    d.className = 'legend-item agent-entry';
    d.innerHTML = `<div class="legend-swatch" style="background:${AGENT_COLORS[i]};border-radius:50%;">${i+1}</div><span>Agent ${i+1} (${name})</span>`;
    legend.appendChild(d);
  });
}

// ─── EVENT LISTENERS ─────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', () => {
  playing ? stopPlay() : startPlay();
});
document.getElementById('btn-step').addEventListener('click', () => {
  stopPlay(); doStep(1);
});
document.getElementById('btn-reset').addEventListener('click', doReset);

document.getElementById('speed-slider').addEventListener('input', e => {
  delay = +e.target.value;
  document.getElementById('speed-val').textContent = delay + 'ms';
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

document.getElementById('btn-clear-log').addEventListener('click', () => {
  document.getElementById('log-console').innerHTML = '';
});
document.getElementById('btn-scroll-log').addEventListener('click', () => {
  autoScroll = !autoScroll;
  document.getElementById('btn-scroll-log').textContent = 'Auto-scroll: ' + (autoScroll ? 'ON' : 'OFF');
});

// Check if model is loaded
fetch('/api/state').then(r=>r.json()).then(d=>{
  const badge = document.getElementById('model-badge');
  if (d.state && d.state.agents) {
    badge.textContent = 'PPO Model';
    badge.style.background = 'rgba(34,197,94,.2)';
    badge.style.color = '#22c55e';
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildLegend();
fetchState();
</script>
</body>
</html>
